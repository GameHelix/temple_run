<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#060014"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Converging track lines (perspective) -->
  <g filter="url(#glow)" stroke="#6600ff" stroke-width="1" fill="none" opacity="0.7">
    <line x1="16" y1="10" x2="4"  y2="28"/>
    <line x1="16" y1="10" x2="10" y2="28"/>
    <line x1="16" y1="10" x2="16" y2="28"/>
    <line x1="16" y1="10" x2="22" y2="28"/>
    <line x1="16" y1="10" x2="28" y2="28"/>
  </g>

  <!-- Neon track surface -->
  <polygon points="16,10 6,27 26,27" fill="rgba(30,0,80,0.8)" stroke="#aa44ff" stroke-width="0.8"/>

  <!-- Horizontal grid lines on track -->
  <g stroke="#6600ff" stroke-width="0.5" opacity="0.5">
    <line x1="11" y1="17" x2="21" y2="17"/>
    <line x1="9"  y1="21" x2="23" y2="21"/>
    <line x1="7"  y1="25" x2="25" y2="25"/>
  </g>

  <!-- Runner figure (neon cyan) -->
  <g filter="url(#glow)" fill="#00e5ff">
    <!-- Head -->
    <circle cx="16" cy="13" r="2"/>
    <!-- Body -->
    <rect x="15" y="15" width="2" height="4" rx="0.5"/>
    <!-- Legs -->
    <line x1="15.5" y1="19" x2="13" y2="23" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="16.5" y1="19" x2="19" y2="22" stroke="#00e5ff" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="15" y1="16" x2="12.5" y2="18" stroke="#0066ff" stroke-width="1.2"/>
    <line x1="17" y1="16" x2="19.5" y2="18" stroke="#0066ff" stroke-width="1.2"/>
  </g>

  <!-- Outer neon ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#6600ff" stroke-width="0.8" opacity="0.6"/>
</svg>
